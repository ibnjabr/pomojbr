<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="pomo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pomojabr</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <main class="app-container">

    <section class="pomodoro-card">
        <h2>Focus Timer</h2>
        <div class="time-display">25:00</div>
        <div class="controls-group">
            <button class="start">Start</button>
            <button class="pause">Pause</button>
            <button class="reset">Reset</button>
        </div>
        <div>
            <input type="text" class="user-time">
        </div>
    </section>

    <section class="todo-card">
        <h2>To Do List</h2>
        <div class="input-group">
            <textarea id="todo-input"></textarea>
        </div>
        <button class="add">+</button>

        <ul class="todo-list">
        </ul>
    </section>
   </main> 

   <footer>
    <p>Made without ☕ by <span>ibnJabr</span></p>
   </footer>
   <script src="script.js"></script>
</body>
</html>
